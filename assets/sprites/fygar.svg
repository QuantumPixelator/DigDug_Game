<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dragonSkin" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#44ff44"/>
      <stop offset="40%" stop-color="#00aa00"/>
      <stop offset="80%" stop-color="#005500"/>
      <stop offset="100%" stop-color="#002200"/>
    </linearGradient>
    <radialGradient id="wingWeb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd88"/>
      <stop offset="70%" stop-color="#aa8822"/>
      <stop offset="100%" stop-color="#443300"/>
    </radialGradient>
    <linearGradient id="fireBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="50%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <filter id="dragonShadow">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#dragonShadow)">
    <!-- Tail with Spikes -->
    <path d="M 70 65 Q 105 70, 95 35 Q 90 55, 75 55 Z" fill="url(#dragonSkin)" stroke="#003300" stroke-width="2"/>
    <polygon points="85,45 92,38 90,48" fill="#ffaa00" stroke="#cc5500" stroke-width="1"/>
    <polygon points="78,52 85,46 82,56" fill="#ffaa00" stroke="#cc5500" stroke-width="1"/>

    <!-- Far Wing -->
    <path d="M 50 45 Q 65 10, 90 15 Q 75 35, 60 45 Z" fill="url(#wingWeb)" stroke="#003300" stroke-width="2"/>
    <!-- Wing Bones -->
    <path d="M 50 45 Q 65 10, 90 15" fill="none" stroke="#005500" stroke-width="2"/>
    <path d="M 60 25 L 75 35" stroke="#005500" stroke-width="1.5"/>

    <!-- Legs -->
    <path d="M 35 70 Q 25 90, 45 95 Q 48 85, 45 70 Z" fill="#006600" stroke="#002200" stroke-width="2"/>
    <path d="M 60 65 Q 65 90, 75 90 Q 72 80, 68 65 Z" fill="#006600" stroke="#002200" stroke-width="2"/>
    <polygon points="30,92 25,96 32,95" fill="#fff"/>
    <polygon points="38,94 40,99 42,94" fill="#fff"/>
    <polygon points="68,88 72,94 74,88" fill="#fff"/>

    <!-- Main Body -->
    <ellipse cx="50" cy="55" rx="28" ry="22" fill="url(#dragonSkin)" stroke="#003300" stroke-width="2"/>
    
    <!-- Scaly Belly Texture -->
    <path d="M 35 70 Q 50 82, 68 65 Q 50 72, 35 70 Z" fill="url(#fireBelly)"/>
    <path d="M 40 72 Q 50 78, 62 68" fill="none" stroke="#880000" stroke-width="1"/>
    <path d="M 45 75 Q 50 79, 58 72" fill="none" stroke="#880000" stroke-width="1"/>

    <!-- Near Wing -->
    <path d="M 40 50 Q 35 15, 65 5 Q 60 30, 48 48 Z" fill="url(#wingWeb)" stroke="#003300" stroke-width="2"/>
    <path d="M 40 50 Q 35 15, 65 5" fill="none" stroke="#005500" stroke-width="2.5"/>
    <path d="M 43 28 L 60 30" stroke="#005500" stroke-width="1.5"/>

    <!-- Neck & Head -->
    <circle cx="32" cy="38" r="20" fill="url(#dragonSkin)" stroke="#003300" stroke-width="2"/>
    
    <!-- Elaborate Snout & Jaw -->
    <path d="M 18 35 Q -5 35, 5 55 Q 20 62, 32 50 Z" fill="#ffcc00" stroke="#cc7700" stroke-width="2"/>
    <!-- Fiery Nostril -->
    <ellipse cx="12" cy="42" rx="4" ry="2" fill="#330000" transform="rotate(-15 12 42)"/>
    <circle cx="11" cy="42" r="1.5" fill="#ff5500"/>
    
    <!-- Sharp Teeth -->
    <polygon points="8,54 10,48 14,55" fill="#ffffff"/>
    <polygon points="16,57 18,50 22,57" fill="#ffffff"/>
    <polygon points="24,56 26,49 30,53" fill="#ffffff"/>

    <!-- Angry Fiery Eye -->
    <path d="M 22 28 Q 30 20, 38 30 Q 30 38, 22 28 Z" fill="#ff0000" stroke="#550000" stroke-width="1.5"/>
    <circle cx="31" cy="29" r="3" fill="#ffff00"/>
    <circle cx="31" cy="29" r="1" fill="#ffffff"/>
    
    <!-- Heavy Brow / Horn -->
    <path d="M 18 24 Q 30 18, 42 26" fill="none" stroke="#004400" stroke-width="5" stroke-linecap="round"/>
    <path d="M 35 18 L 40 5 L 45 20 Z" fill="#ffaa00" stroke="#cc5500" stroke-width="1"/>
  </g>
</svg>