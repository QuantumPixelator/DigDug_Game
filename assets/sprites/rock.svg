<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Beautiful Realistic Rock Gradients -->
    <linearGradient id="rockFaceMain" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#a0b0b8"/>
      <stop offset="40%" stop-color="#607078"/>
      <stop offset="100%" stop-color="#2a353a"/>
    </linearGradient>
    <linearGradient id="rockFaceLight" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#d0dce0"/>
      <stop offset="100%" stop-color="#809098"/>
    </linearGradient>
    <linearGradient id="rockFaceDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#151b1f"/>
      <stop offset="100%" stop-color="#404f58"/>
    </linearGradient>
    <linearGradient id="moss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#55aa33"/>
      <stop offset="100%" stop-color="#225511"/>
    </linearGradient>
    <filter id="heavyShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g filter="url(#heavyShadow)">
    <!-- Base Silhouette -->
    <path d="M 20 85 Q 50 98, 85 80 Q 98 50, 80 20 Q 50 5, 20 25 Q 5 55, 20 85 Z" fill="#1a2024"/>

    <!-- Main Polygons for 3D Chiseled Look -->
    
    <!-- Top Left Bright Face -->
    <path d="M 20 25 L 45 10 L 60 30 L 30 45 Z" fill="url(#rockFaceLight)"/>
    
    <!-- Center Main Face -->
    <path d="M 30 45 L 60 30 L 80 50 L 50 70 Z" fill="url(#rockFaceMain)"/>
    
    <!-- Bottom Left Dark Face -->
    <path d="M 20 25 L 30 45 L 50 70 L 20 85 Z" fill="url(#rockFaceDark)"/>
    
    <!-- Bottom Right Very Dark Face -->
    <path d="M 50 70 L 80 50 L 85 80 Z" fill="#202a30"/>
    
    <!-- Top Right Medium Face -->
    <path d="M 45 10 L 80 20 L 80 50 L 60 30 Z" fill="#687b85"/>

    <!-- Sharp Edge Highlights -->
    <path d="M 20 25 L 30 45 L 60 30" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M 30 45 L 50 70" fill="none" stroke="#a0b0b8" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <path d="M 45 10 L 60 30" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

    <!-- Cracks & Fissures -->
    <path d="M 40 40 L 45 50 L 55 52 M 45 50 L 42 60" fill="none" stroke="#111518" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 65 35 L 72 45 L 68 55" fill="none" stroke="#111518" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 25 60 L 35 65 L 38 75" fill="none" stroke="#0a0d0f" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Mineral / Crystal Inclusions (Tiny glowing bits) -->
    <polygon points="48,45 50,42 52,46 49,48" fill="#00ffcc" opacity="0.8"/>
    <polygon points="65,50 67,48 69,52 66,54" fill="#00ffcc" opacity="0.6"/>

    <!-- Mossy Patches on Top Edges -->
    <path d="M 22 22 Q 30 20, 35 28 Q 28 32, 22 22 Z" fill="url(#moss)" opacity="0.8"/>
    <path d="M 40 12 Q 55 10, 50 20 Q 42 22, 40 12 Z" fill="url(#moss)" opacity="0.9"/>
    <path d="M 65 25 Q 75 22, 70 32 Q 62 30, 65 25 Z" fill="url(#moss)" opacity="0.7"/>
    
    <!-- Moss details -->
    <circle cx="30" cy="25" r="2" fill="#77cc44"/>
    <circle cx="45" cy="15" r="2.5" fill="#77cc44"/>
  </g>
</svg>